<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        // Programação Síncrona
        let a = 1;
        const b = 2;
        console.log(a + b);

        a = 3;
        console.log(a + b);

        console.log('###################');

        // Progrmação Assíncrona
        let c = 1;
        const d = 2;

        setTimeout(() => {
            console.log("Console 1:" (c + d));
        }, 3000);

        c = 3;
        console.log("Console 2: "(c + d));
     
        

    </script>
    
</body>
</html>
